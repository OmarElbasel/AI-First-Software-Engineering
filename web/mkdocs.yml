site_name: AI-First Software Engineering
site_description: A production-grade handbook for engineering software with AI as a disciplined teammate.
repo_url: https://github.com/OmarEbasel/AI-First-Software-Engineering
edit_uri: ""

docs_dir: ..
site_dir: ../../AI-First-Software-Engineering-site

exclude_docs: |
  /web/
  !/templates/
  /docs/
  /_t/
  /prompts/
  AGENTS.md
  CLAUDE.md
  /START-HERE.pdf
  /mkdocs.yml

theme:
  name: material
  features:
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: ar
          name: العربية
          build: true
